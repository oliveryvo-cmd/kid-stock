<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Kidstok</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;font-family:'Segoe UI',Arial,sans-serif;color:#fff;}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:rgba(10,10,15,0.95);border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.logo{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;}
.nav-links{display:flex;gap:24px;align-items:center;}
.nav-links a{color:#aaa;text-decoration:none;font-size:0.85rem;font-weight:600;transition:color 0.2s;}
.nav-links a:hover{color:#fff;}
.nav-btn{padding:8px 20px;background:linear-gradient(135deg,#ff6b6b,#ffd93d);border:none;border-radius:50px;font-size:0.8rem;font-weight:900;color:#000;cursor:pointer;text-decoration:none;}
.loading{text-align:center;padding:100px 20px;color:#444;font-size:1rem;}
.profile-banner{height:180px;background:linear-gradient(135deg,#ff6b6b22,#4d96ff22);border-bottom:1px solid rgba(255,255,255,0.06);}
.profile-main{max-width:700px;margin:0 auto;padding:0 24px 60px;}
.profile-header{display:flex;align-items:flex-end;gap:20px;margin-top:-50px;margin-bottom:24px;}
.profile-avatar{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;color:#000;border:4px solid #0a0a0f;flex-shrink:0;}
.profile-info{flex:1;padding-bottom:8px;}
.profile-name{font-size:1.4rem;font-weight:900;margin-bottom:4px;}
.profile-handle{font-size:0.8rem;color:#555;margin-bottom:12px;}
.profile-stats{display:flex;gap:24px;}
.stat{text-align:center;}
.stat-num{font-size:1.2rem;font-weight:900;}
.stat-label{font-size:0.65rem;color:#555;letter-spacing:1px;}
.profile-actions{display:flex;gap:10px;margin-bottom:32px;}
.edit-btn{padding:10px 24px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:50px;font-size:0.78rem;font-weight:900;color:#fff;cursor:pointer;}
.logout-btn{padding:10px 24px;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);border-radius:50px;font-size:0.78rem;font-weight:900;color:#ff6b6b;cursor:pointer;}
.section-label{font-size:0.6rem;letter-spacing:3px;color:#555;margin-bottom:16px;}
.empty{text-align:center;padding:48px 20px;color:#333;}
.empty-icon{font-size:3rem;margin-bottom:12px;}
.empty-text{font-size:0.85rem;color:#444;}
.post-btn{display:inline-block;margin-top:16px;padding:12px 28px;background:linear-gradient(135deg,#ff6b6b,#ffd93d);border:none;border-radius:50px;font-size:0.8rem;font-weight:900;color:#000;cursor:pointer;}
.badge{display:inline-block;font-size:0.55rem;letter-spacing:1px;padding:3px 10px;border-radius:50px;font-weight:900;margin-left:8px;vertical-align:middle;}
</style>
</head>
<body>
<nav>
  <div class="logo" onclick="window.location.href='index.html'">Kidstok</div>
  <div class="nav-links">
    <a href="feed.html">Feed</a>
    <a href="wiki.html">Wiki</a>
    <a href="explore.html">Explore</a>
    <a href="safety.html">Safety</a>
    <a href="signup.html" class="nav-btn" id="navJoin">Join Free</a>
  </div>
</nav>

<div id="loading" class="loading">Loading profile...</div>

<div id="profileContent" style="display:none;">
  <div class="profile-banner"></div>
  <div class="profile-main">
    <div class="profile-header">
      <div class="profile-avatar" id="avatar" style="background:#ff6b6b;">?</div>
      <div class="profile-info">
        <div class="profile-name" id="displayName">—
          <span class="badge" style="background:rgba(255,217,61,0.2);color:#ffd93d;">⭐ CREATOR</span>
        </div>
        <div class="profile-handle" id="handle">@—</div>
        <div class="profile-stats">
          <div class="stat"><div class="stat-num" id="followersCount">0</div><div class="stat-label">FOLLOWERS</div></div>
          <div class="stat"><div class="stat-num" id="followingCount">0</div><div class="stat-label">FOLLOWING</div></div>
          <div class="stat"><div class="stat-num" id="postsCount">0</div><div class="stat-label">POSTS</div></div>
        </div>
      </div>
    </div>

    <div class="profile-actions">
      <button class="edit-btn">✏️ Edit Profile</button>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>

    <div class="section-label">YOUR POSTS</div>
    <div class="empty">
      <div class="empty-icon">📝</div>
      <div class="empty-text">You haven't posted anything yet!</div>
      <button class="post-btn" onclick="window.location.href='feed.html'">Go to Feed →</button>
    </div>
  </div>
</div>

<div id="notLoggedIn" style="display:none;text-align:center;padding:100px 20px;">
  <div style="font-size:3rem;margin-bottom:16px;">🔒</div>
  <div style="font-size:1.2rem;font-weight:900;margin-bottom:8px;">You're not logged in</div>
  <div style="font-size:0.85rem;color:#555;margin-bottom:24px;">Sign in to see your profile</div>
  <a href="login.html" style="padding:14px 32px;background:linear-gradient(135deg,#ff6b6b,#ffd93d);border-radius:50px;font-size:0.9rem;font-weight:900;color:#000;text-decoration:none;">Log In</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBF8NZvpjz8blZi4LL-Q7n-Q3Je73mZ5mo",
  authDomain: "kid-stock-7a377.firebaseapp.com",
  projectId: "kid-stock-7a377",
  storageBucket: "kid-stock-7a377.firebasestorage.app",
  messagingSenderId: "153069846242",
  appId: "1:153069846242:web:bdae0c7bb120e9245228bb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff9f43','#a29bfe'];

onAuthStateChanged(auth, user => {
  document.getElementById('loading').style.display = 'none';
  if(user) {
    const username = user.displayName || user.email.split('@')[0];
    const initials = username.slice(0,2).toUpperCase();
    const color = colors[username.charCodeAt(0) % colors.length];

    document.getElementById('avatar').textContent = initials;
    document.getElementById('avatar').style.background = color;
    document.getElementById('displayName').innerHTML = username + ' <span class="badge" style="background:rgba(255,217,61,0.2);color:#ffd93d;">⭐ CREATOR</span>';
    document.getElementById('handle').textContent = '@' + username.toLowerCase().replace(/\s/g,'');
    document.getElementById('followersCount').textContent = '0';
    document.getElementById('followingCount').textContent = '0';
    document.getElementById('postsCount').textContent = '0';

    document.getElementById('navJoin').textContent = username;
    document.getElementById('navJoin').href = 'profile.html';

    document.getElementById('profileContent').style.display = 'block';
  } else {
    document.getElementById('notLoggedIn').style.display = 'block';
  }
});

window.logout = async function() {
  await signOut(auth);
  window.location.href = 'index.html';
}
</script>
</body>
</html>
