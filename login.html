<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Kidstok</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;font-family:'Segoe UI',Arial,sans-serif;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:48px;width:100%;max-width:440px;margin:20px;}
.logo{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:8px;cursor:pointer;}
.subtitle{text-align:center;color:#555;font-size:0.8rem;letter-spacing:2px;margin-bottom:36px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.75rem;font-weight:700;color:#888;letter-spacing:1px;margin-bottom:6px;}
.field input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:rgba(255,107,107,0.5);}
.field input::placeholder{color:#333;}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#ff6b6b,#ffd93d);border:none;border-radius:50px;font-size:0.9rem;font-weight:900;color:#000;cursor:pointer;margin-top:8px;letter-spacing:1px;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.signup-link{text-align:center;margin-top:20px;font-size:0.75rem;color:#555;}
.signup-link a{color:#ff6b6b;text-decoration:none;font-weight:700;}
.error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);border-radius:10px;padding:10px 14px;font-size:0.78rem;color:#ff6b6b;margin-bottom:16px;display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo" onclick="window.location.href='index.html'">Kidstok</div>
  <div class="subtitle">WELCOME BACK</div>

  <div class="error" id="error"></div>
  <div class="field">
    <label>EMAIL</label>
    <input type="email" placeholder="Your email address" id="email"/>
  </div>
  <div class="field">
    <label>PASSWORD</label>
    <input type="password" placeholder="Your password" id="password"/>
  </div>
  <button class="btn" id="loginBtn" onclick="login()">🚀 LOG IN</button>
  <div class="signup-link">Don't have an account? <a href="signup.html">Join free</a></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBF8NZvpjz8blZi4LL-Q7n-Q3Je73mZ5mo",
  authDomain: "kid-stock-7a377.firebaseapp.com",
  projectId: "kid-stock-7a377",
  storageBucket: "kid-stock-7a377.firebasestorage.app",
  messagingSenderId: "153069846242",
  appId: "1:153069846242:web:bdae0c7bb120e9245228bb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error');
  const btn = document.getElementById('loginBtn');

  errorEl.style.display = 'none';

  if(!email || !password) {
    errorEl.textContent = 'Please fill in all the fields!';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = 'feed.html';
  } catch(err) {
    let msg = 'Something went wrong. Try again!';
    if(err.code === 'auth/invalid-credential') msg = 'Wrong email or password!';
    if(err.code === 'auth/user-not-found') msg = 'No account found with that email!';
    if(err.code === 'auth/wrong-password') msg = 'Wrong password!';
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '🚀 LOG IN';
  }
}
</script>
</body>
</html>
