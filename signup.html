<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Kidstok</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;font-family:'Segoe UI',Arial,sans-serif;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:48px;width:100%;max-width:440px;margin:20px;}
.logo{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:8px;cursor:pointer;}
.subtitle{text-align:center;color:#555;font-size:0.8rem;letter-spacing:2px;margin-bottom:36px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:0.75rem;font-weight:700;color:#888;letter-spacing:1px;margin-bottom:6px;}
.field input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:rgba(255,107,107,0.5);}
.field input::placeholder{color:#333;}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#ff6b6b,#ffd93d);border:none;border-radius:50px;font-size:0.9rem;font-weight:900;color:#000;cursor:pointer;margin-top:8px;letter-spacing:1px;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.login-link{text-align:center;margin-top:20px;font-size:0.75rem;color:#555;}
.login-link a{color:#ff6b6b;text-decoration:none;font-weight:700;}
.safe{text-align:center;margin-top:24px;font-size:0.65rem;letter-spacing:2px;color:#333;}
.error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);border-radius:10px;padding:10px 14px;font-size:0.78rem;color:#ff6b6b;margin-bottom:16px;display:none;}
.success{display:none;text-align:center;padding:20px;}
.success h2{font-size:1.5rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,#ff6b6b,#ffd93d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.success p{color:#666;font-size:0.85rem;line-height:1.8;}
</style>
</head>
<body>
<div class="card">
  <div class="logo" onclick="window.location.href='index.html'">Kidstok</div>
  <div class="subtitle">CREATE YOUR FREE ACCOUNT</div>

  <div id="form">
    <div class="error" id="error"></div>
    <div class="field">
      <label>YOUR NAME</label>
      <input type="text" placeholder="First name only is fine" id="name"/>
    </div>
    <div class="field">
      <label>USERNAME</label>
      <input type="text" placeholder="@coolkid123" id="username"/>
    </div>
    <div class="field">
      <label>AGE</label>
      <input type="number" placeholder="How old are you?" min="6" max="17" id="age"/>
    </div>
    <div class="field">
      <label>EMAIL</label>
      <input type="email" placeholder="Your email address" id="email"/>
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input type="password" placeholder="Make it strong!" id="password"/>
    </div>
    <button class="btn" id="signupBtn" onclick="signup()">🚀 CREATE MY ACCOUNT</button>
    <div class="login-link">Already have an account? <a href="login.html">Log in</a></div>
    <div class="safe">🛡️ 100% SAFE · NO ADS · FREE FOREVER</div>
  </div>

  <div class="success" id="success">
    <div style="font-size:3rem;margin-bottom:16px;">🎉</div>
    <h2>Welcome to Kidstok!</h2>
    <p>Your account is ready.<br>You're one of the first kids in!</p>
    <br>
    <button class="btn" onclick="window.location.href='feed.html'">Go to Feed →</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBF8NZvpjz8blZi4LL-Q7n-Q3Je73mZ5mo",
  authDomain: "kid-stock-7a377.firebaseapp.com",
  projectId: "kid-stock-7a377",
  storageBucket: "kid-stock-7a377.firebasestorage.app",
  messagingSenderId: "153069846242",
  appId: "1:153069846242:web:bdae0c7bb120e9245228bb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = async function() {
  const name = document.getElementById('name').value.trim();
  const username = document.getElementById('username').value.trim();
  const age = parseInt(document.getElementById('age').value);
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error');
  const btn = document.getElementById('signupBtn');

  errorEl.style.display = 'none';

  if(!name || !username || !age || !email || !password) {
    errorEl.textContent = 'Please fill in all the fields!';
    errorEl.style.display = 'block';
    return;
  }
  if(age < 6 || age > 17) {
    errorEl.textContent = 'Kidstok is for kids ages 6-17!';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(userCredential.user, { displayName: username });
    document.getElementById('form').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  } catch(err) {
    let msg = 'Something went wrong. Try again!';
    if(err.code === 'auth/email-already-in-use') msg = 'That email is already used. Try logging in!';
    if(err.code === 'auth/weak-password') msg = 'Password needs to be at least 6 characters!';
    if(err.code === 'auth/invalid-email') msg = 'Please enter a valid email address!';
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '🚀 CREATE MY ACCOUNT';
  }
}
</script>
</body>
</html>
